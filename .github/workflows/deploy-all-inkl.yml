name: Deploy to ALL-INKL

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build:deploy

      - name: Verify deployment base href
        run: npm run verify:base-href

      - name: Detect build directory
        id: build_dir
        run: |
          if [ -d "dist/huepfburgen-app/browser" ]; then
            echo "path=dist/huepfburgen-app/browser" >> "$GITHUB_OUTPUT"
          elif [ -d "dist/huepfburgen-app" ]; then
            echo "path=dist/huepfburgen-app" >> "$GITHUB_OUTPUT"
          else
            echo "No build output found" >&2
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALLINKL_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.ALLINKL_SSH_HOST }}
          SSH_PORT: ${{ secrets.ALLINKL_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        env:
          SSH_HOST: ${{ secrets.ALLINKL_SSH_HOST }}
          SSH_USER: ${{ secrets.ALLINKL_SSH_USER }}
          SSH_PORT: ${{ secrets.ALLINKL_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.ALLINKL_DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync files to ALL-INKL
        env:
          SSH_HOST: ${{ secrets.ALLINKL_SSH_HOST }}
          SSH_USER: ${{ secrets.ALLINKL_SSH_USER }}
          SSH_PORT: ${{ secrets.ALLINKL_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.ALLINKL_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22}" \
            "${{ steps.build_dir.outputs.path }}/" \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
