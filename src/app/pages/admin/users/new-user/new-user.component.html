<div class="new-user-page">
  <h2>Neuen Benutzer anlegen</h2>

  <mat-form-field appearance="fill">
    <mat-label>E-Mail</mat-label>
    <input matInput [(ngModel)]="email" type="email" required />
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Rolle</mat-label>
    <mat-select [(ngModel)]="role">
      <mat-option value="user">User</mat-option>
      <mat-option value="admin">Admin</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="button-row">
    <button mat-raised-button color="primary" (click)="createUserPlaceholder()" [disabled]="loading">
      {{ loading ? 'Speichern…' : 'Benutzer erstellen' }}
    </button>
    <button mat-button routerLink="/admin/users">Zurück</button>
  </div>

  <p class="success" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>
</div>
